<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Zip — Level Puzzle</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="start-screen" id="start-screen">
        <div class="start-card">
            <div class="brand">
                <span class="mark">Z</span>
                <h1>ZIP</h1>
            </div>
            <p class="start-tagline">Fill the board. Follow the numbers.</p>
            <div class="mode-buttons">
                <button id="mode-1p" class="mode-btn">
                    <span class="mode-title">1 Player</span>
                    <span class="mode-sub">Solo · drag, arrows or WASD</span>
                </button>
                <button id="mode-2p" class="mode-btn">
                    <span class="mode-title">2 Players</span>
                    <span class="mode-sub">Side by side · WASD vs arrow keys</span>
                </button>
            </div>
        </div>
    </div>

    <main class="card hidden" id="game-card">
        <div class="topbar">
            <button id="menu-btn" class="icon-btn" aria-label="Back to menu">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
            <div class="brand">
                <span class="mark">Z</span>
                <h1>ZIP</h1>
            </div>
            <button id="sound-btn" class="icon-btn" aria-label="Mute sound">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 9v6h4l5 4V5L7 9H3z" fill="currentColor" />
                    <g class="waves" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M15.5 9a4 4 0 0 1 0 6" />
                        <path d="M18 6.5a7.5 7.5 0 0 1 0 11" />
                    </g>
                    <line class="slash" x1="4" y1="3.5" x2="20.5" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>

        <p class="hint" id="hint-text"></p>

        <div class="boards" id="boards"></div>

        <div class="reset-row">
            <button id="reset-btn" class="btn-danger">Reset Game</button>
        </div>
    </main>

    <div class="overlay" id="overlay">
        <div class="modal">
            <div class="stars" id="stars"><span>★</span><span>★</span><span>★</span></div>
            <h2 id="win-title">Level complete!</h2>
            <p class="win-perfect" id="win-perfect"></p>
            <p class="win-line">Time <b id="win-time">0:00</b> · Backtracks <b id="win-backtracks">0</b></p>
            <p class="best-line" id="best-row">Best <b id="win-best">—</b><span class="newbest" id="newbest">New best!</span></p>
            <div class="modal-actions">
                <button id="next-btn" class="btn-primary">Next level →</button>
                <button id="share-btn" class="btn-ghost">Share result</button>
                <button id="replay-btn" class="btn-ghost">New puzzle</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script src="script.js"></script>
</body>

</html>
